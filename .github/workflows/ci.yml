name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check syntax
        run: |
          node -c server/index.js
          node -c server/middleware/errorHandler.js
          node -c server/middleware/validator.js
          node -c server/utils/logger.js
      
      - name: Verify build
        run: npm run start --if-present

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Build Docker image
        run: docker build -t neuro-sales-widget:test .
      
      - name: Test Docker image
        run: |
          docker run --rm neuro-sales-widget:test node -c server/index.js

  deploy:
    runs-on: ubuntu-latest
    needs: [lint-and-test, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd /var/www/neuro-sales-widget || mkdir -p /var/www/neuro-sales-widget && cd /var/www/neuro-sales-widget
            git pull origin main
            npm ci --production
            pm2 restart neuro-sales-widget || pm2 start server/index.js --name neuro-sales-widget
